server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Frontend - Serve Vite build
    location / {
        root /var/www/work-updates/dist;
        index index.html;
        try_files $uri /index.html;
    }

    # Backend - Proxy all /api requests to Gunicorn/FastAPI
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ensure it handles both /api and /api/
        proxy_redirect off;
    }

    # Static files (avatars, uploads, etc.)
    location /static {
        alias /var/www/backend/static;
    }

    location /uploads {
        alias /var/www/backend/uploads;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
