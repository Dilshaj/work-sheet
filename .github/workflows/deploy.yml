name: Fullstack CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # SSH Deploy
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e  # Stop on any error
            echo "🚀 Deployment Started"

            cd /home/ubuntu/app

            # Pull latest code
            git pull origin main

            # =========================
            # BACKEND SETUP
            # =========================
            cd backend
            echo "📦 Setting up Backend..."
            python3 -m venv venv || true
            source venv/bin/activate
            pip install -r requirements.txt

            # Create/Update .env file
            cat > .env <<EOL
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=${{ secrets.ALGORITHM }}
            ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
            ALLOWED_ORIGINS=["http://localhost:5173", "http://16.112.203.49"]
            EOL

            # Restart backend
            pm2 restart backend || pm2 start /home/ubuntu/app/backend/venv/bin/uvicorn \
            "app.main:app --host 0.0.0.0 --port 5000" --name backend

            # =========================
            # FRONTEND SETUP
            # =========================
            cd ../work-updates
            echo "📦 Building Frontend..."
            
            npm install
            rm -rf dist
            npm run build

            # Check if dist was created
            if [ ! -d "dist" ]; then
                echo "❌ BUILD FAILED: dist folder not created"
                exit 1
            fi

            # Add a version tag we can check in the browser
            echo "Build Date: $(date)" > dist/version.txt

            # =========================
            # NGINX SYNC
            # =========================
            echo "🔧 Syncing Nginx..."
            cd ..
            if [ -f "deployment/nginx.conf" ]; then
                sudo cp deployment/nginx.conf /etc/nginx/sites-available/default
                sudo ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
                sudo nginx -t && sudo systemctl restart nginx
            fi

            pm2 save
            echo "✅ Deployment Completed Successfully!"
